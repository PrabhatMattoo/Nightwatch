global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "nightwatch-alertmanager:9093"

scrape_configs:
  - job_name: cadvisor
    static_configs:
      - targets:
          - "nightwatch-cadvisor:8080"
