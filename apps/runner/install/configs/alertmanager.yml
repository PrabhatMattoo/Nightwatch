global:
  resolve_timeout: 5m

route:
  receiver: nightwatch
  group_by: ['alertname', 'compose_project', 'compose_service', 'name']
  group_wait: 5s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: nightwatch
    webhook_configs:
      - url: "${PLATFORM_URL}/alerts/ingest"
        http_config:
          authorization:
            type: Bearer
            credentials: "${NIGHTWATCH_INGEST_TOKEN}"
        send_resolved: true
