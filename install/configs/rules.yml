groups:
  - name: nightwatch
    rules:
      - alert: ContainerHighMemory
        expr: |
          (container_memory_usage_bytes{name!=""} / container_spec_memory_limit_bytes{name!=""}) > 0.85
            and container_spec_memory_limit_bytes{name!=""} > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} memory usage above 85%"

      - alert: ContainerHighCPU
        expr: |
          rate(container_cpu_usage_seconds_total{name!="", cpu="total"}[5m]) > 0.90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} CPU usage above 90%"

      - alert: ContainerRestartLoop
        expr: |
          increase(container_restart_count{name!=""}[15m]) > 3
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} restarted more than 3 times in 15 minutes"

      - alert: HostDiskCritical
        expr: |
          (container_fs_usage_bytes{id="/"} / container_fs_limit_bytes{id="/"}) > 0.90
            and container_fs_limit_bytes{id="/"} > 0
        labels:
          severity: critical
        annotations:
          summary: "Disk usage above 90%"

      - alert: ContainerDown
        expr: |
          time() - container_last_seen{name!=""} > 60
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} has been down for more than 1 minute"
