global:
  resolve_timeout: 5m

route:
  receiver: nightwatch
  group_by: ['alertname', 'name']
  group_wait: 5s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: nightwatch
    webhook_configs:
      - url: "http://host.docker.internal:3000/alerts/ingest?token=inst_local"
        send_resolved: true
