global:
  resolve_timeout: 5m

route:
  receiver: nightwatch
  group_by: ['alertname', 'name']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: nightwatch
    webhook_configs:
      - url: "${PLATFORM_URL}/alerts/ingest?token=${NIGHTWATCH_TOKEN}"
        send_resolved: true
