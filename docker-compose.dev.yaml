services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nightwatch
      POSTGRES_PASSWORD: nightwatch
      POSTGRES_DB: nightwatch
    ports:
      # 5433 on the host to avoid clashing with Clipper's own Postgres (5432).
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nightwatch"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      # 6380 on the host to avoid clashing with Clipper's own Redis (6379).
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
